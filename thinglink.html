
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ThingLink Embed Test</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 40px auto; max-width: 1000px; padding: 0 16px; }
    </style>
  </head>
  <body>
    <h1>ThingLink Embed Test</h1>

    <!-- Replace with a public ThingLink scene URL -->
    <iframe
      width="960"
      height="630"
      data-original-width="960"
      data-original-height="630"
      src="https://www.thinglink.com/view/scene/SCENE_ID"
      type="text/html"
      style="border: none;"
      webkitallowfullscreen
      mozallowfullscreen
      allowfullscreen
      scrolling="no"></iframe>
    <script async src="https://cdn.thinglink.me/jse/responsive.js"></script>
  </body>
</html>
